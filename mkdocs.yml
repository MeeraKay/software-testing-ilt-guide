site_name: 1 Day Software Testing ILT
site_description: Learner's handbook for the UiPath Software & Agentic Testing Instructor-Led Training
site_author: UiPath

theme:
  name: material
  icon:
    logo: material/robot-outline
  palette:
    scheme: default
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list

plugins:
  - search

nav:
  - Home: index.md
  - "Instructor-Led Training":
      - "Overview": module-1-instructor-led-training/index.md
      - "1. Getting Started with Test Manager": module-1-instructor-led-training/01-getting-started-test-manager.md
      - "2. Agentic Testing: From Requirement to Test Cases": module-1-instructor-led-training/02-agentic-testing.md
      - "3. Getting Started in Studio": module-1-instructor-led-training/03-getting-started-studio.md
      - "4. Object Repository": module-1-instructor-led-training/04-object-repository.md
      - "5. Test Automation Project": module-1-instructor-led-training/05-test-automation-project.md
      - "6. Connect Your Project to Test Manager": module-1-instructor-led-training/06-connect-project-to-test-manager.md
      - "7. From Manual Test Case to Test Automation": module-1-instructor-led-training/07-manual-to-automated-test-case.md
      - "8. Data-Driven Testing and Test Data Management": module-1-instructor-led-training/08-data-driven-testing.md
      - "9. Orchestrator": module-1-instructor-led-training/09-orchestrator.md
      - "10. Publishing Test Cases": module-1-instructor-led-training/10-publishing-test-cases.md
      - "11. Execute Test Cases in Test Manager": module-1-instructor-led-training/11-execute-test-cases.md
      - "12. Building Your Own AI Agents": module-1-instructor-led-training/12-building-your-own-ai-agents.md
      - "You did it!": module-1-instructor-led-training/you-did-it.md
  - "Course Completion Exercises":
      - "Overview": module-2-course-completion-exercises/index.md
      - "1. Autopilot for Developers": module-2-course-completion-exercises/01-autopilot-for-developers.md
      - "2. Integration Service": module-2-course-completion-exercises/02-integration-service.md
      - "3. Create a Custom Connection": module-2-course-completion-exercises/03-custom-connection-integration-service.md
      - "4. API Testing": module-2-course-completion-exercises/04-api-testing.md
      - "5. Coded Test Cases": module-2-course-completion-exercises/05-coded-test-cases.md
      - "6. Additional Exercises": module-2-course-completion-exercises/06-additional-exercises.md
      - "Receive Credit": module-2-course-completion-exercises/you-did-it.md
  - "Additional Topics":
      - "Overview": module-3-additional-topics/index.md
      - "Templates": module-3-additional-topics/01-templates.md
      - "Testing Framework": module-3-additional-topics/02-testing-framework.md
      - "Terminal Testing": module-3-additional-topics/03-terminal-testing.md
      - "Best Practices": module-3-additional-topics/04-best-practices.md
      - "Database Testing": module-3-additional-topics/05-database-testing.md
      - "Other Agentic Features in Test Manager": module-3-additional-topics/06-other-agentic-features.md
      - "SAP Heatmap and Change Impact Analysis": module-3-additional-topics/07-sap-heatmap.md
      - "CI/CD": module-3-additional-topics/08-cicd.md
